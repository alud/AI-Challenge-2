<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .icon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo } = React;

    // ============================================================
    // ICONS (inline SVG, no external library needed)
    // ============================================================
    const SearchIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>
      </svg>
    );
    const StarIcon = ({ className, filled }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    );
    const ChevronDownIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m6 9 6 6 6-6"/>
      </svg>
    );
    const PresentationIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M2 3h20"/><path d="M21 3v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3"/><path d="m7 21 5-6 5 6"/><path d="M12 15v6"/>
      </svg>
    );

    // ============================================================
    // SYNTHETIC DATA — Greek mythology theme
    // No real names, departments, or photos used.
    // Location codes are fictional (OL = Olympus, U = Unit, D = Department, G = Group, T = Team)
    // ============================================================
    const CATEGORIES = ['Innovation', 'Mentorship', 'Delivery', 'Leadership', 'Collaboration'];
    const YEARS = ['2023', '2024', '2025'];
    const QUARTERS = ['Q1', 'Q2', 'Q3', 'Q4'];

    const AVATAR_COLORS = [
      ['#FDE68A', '#B45309'], ['#BFDBFE', '#1E40AF'], ['#FECACA', '#991B1B'],
      ['#C7D2FE', '#3730A3'], ['#BBF7D0', '#065F46'], ['#FBCFE8', '#9D174D'],
      ['#DDD6FE', '#5B21B6'], ['#FED7AA', '#9A3412'], ['#A7F3D0', '#115E59'],
    ];

    function makeAvatar(name, idx) {
      const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2);
      const [bg, fg] = AVATAR_COLORS[idx % AVATAR_COLORS.length];
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'>
        <rect width='120' height='120' fill='${bg}'/>
        <text x='60' y='75' font-family='Inter,Arial' font-size='44' font-weight='600' fill='${fg}' text-anchor='middle'>${initials}</text>
      </svg>`;
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    }

    const RAW_EMPLOYEES = [
      { name: 'Athena Pallas', title: 'Senior Software Engineer', loc: 'OL.U1.D1.G1', total: 536, contributions: 17, year: '2025', quarter: 'Q1', category: 'Innovation' },
      { name: 'Apollo Helios', title: 'Group Manager', loc: 'OL.U1.G3', total: 328, contributions: 10, year: '2025', quarter: 'Q1', category: 'Leadership' },
      { name: 'Artemis Selene', title: 'Lead QA Engineer', loc: 'OL.U1.D1.G1.T1', total: 320, contributions: 14, year: '2025', quarter: 'Q1', category: 'Delivery' },
      { name: 'Hermes Argus', title: 'Solution Architect', loc: 'OL.U2.D1.G1', total: 298, contributions: 11, year: '2025', quarter: 'Q2', category: 'Innovation' },
      { name: 'Hephaestus Forge', title: 'Principal Engineer', loc: 'OL.U2.D2.G1', total: 274, contributions: 9, year: '2024', quarter: 'Q4', category: 'Mentorship' },
      { name: 'Demeter Flora', title: 'Engineering Manager', loc: 'OL.U1.D2.G2', total: 256, contributions: 13, year: '2024', quarter: 'Q4', category: 'Leadership' },
      { name: 'Dionysus Bacchus', title: 'Senior QA Engineer', loc: 'OL.U2.D1.G2.T1', total: 241, contributions: 8, year: '2024', quarter: 'Q3', category: 'Delivery' },
      { name: 'Persephone Kore', title: 'Product Designer', loc: 'OL.U3.D1.G1', total: 228, contributions: 12, year: '2024', quarter: 'Q3', category: 'Collaboration' },
      { name: 'Hestia Vesta', title: 'Senior DevOps Engineer', loc: 'OL.U2.D3.G1', total: 215, contributions: 10, year: '2024', quarter: 'Q2', category: 'Innovation' },
      { name: 'Orpheus Lyra', title: 'Tech Lead', loc: 'OL.U1.D1.G2', total: 203, contributions: 7, year: '2024', quarter: 'Q2', category: 'Mentorship' },
      { name: 'Atlas Titan', title: 'Senior Backend Engineer', loc: 'OL.U2.D2.G2', total: 189, contributions: 9, year: '2024', quarter: 'Q1', category: 'Delivery' },
      { name: 'Iris Rainbow', title: 'Frontend Engineer', loc: 'OL.U1.D2.G1', total: 176, contributions: 6, year: '2023', quarter: 'Q4', category: 'Collaboration' },
      { name: 'Nike Victory', title: 'Scrum Master', loc: 'OL.U3.D2.G1', total: 162, contributions: 8, year: '2023', quarter: 'Q4', category: 'Leadership' },
      { name: 'Pan Sylvan', title: 'Mobile Engineer', loc: 'OL.U1.D3.G1', total: 148, contributions: 5, year: '2023', quarter: 'Q3', category: 'Innovation' },
      { name: 'Eos Aurora', title: 'Data Engineer', loc: 'OL.U2.D3.G2', total: 134, contributions: 7, year: '2023', quarter: 'Q3', category: 'Delivery' },
      { name: 'Helios Sol', title: 'Junior Software Engineer', loc: 'OL.U1.D1.G3', total: 121, contributions: 4, year: '2023', quarter: 'Q2', category: 'Mentorship' },
      { name: 'Thalia Muse', title: 'UX Researcher', loc: 'OL.U3.D1.G2', total: 108, contributions: 6, year: '2023', quarter: 'Q2', category: 'Collaboration' },
      { name: 'Boreas Wind', title: 'Site Reliability Engineer', loc: 'OL.U2.D3.G3', total: 95, contributions: 3, year: '2023', quarter: 'Q1', category: 'Innovation' },
    ];

    const EMPLOYEES = RAW_EMPLOYEES.map((e, i) => ({ ...e, id: i + 1, avatar: makeAvatar(e.name, i) }));

    // ============================================================
    // COMPONENTS
    // ============================================================
    function FilterDropdown({ value, options, onChange, label }) {
      return (
        <div className="relative">
          <select
            value={value}
            onChange={(e) => onChange(e.target.value)}
            className="appearance-none bg-white border border-gray-300 rounded-md py-2 pl-3 pr-9 text-sm text-gray-700 cursor-pointer hover:border-gray-400 focus:outline-none focus:border-blue-500 min-w-[140px]"
          >
            <option value="all">{label}</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
          <ChevronDownIcon className="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none" />
        </div>
      );
    }

    function PodiumCard({ employee, rank }) {
      const config = {
        1: { badgeBg: 'bg-amber-400', ringColor: 'ring-amber-400', podiumBg: 'bg-amber-300', podiumNum: 'text-amber-200', height: 'h-56', avatarSize: 'w-28 h-28', order: 'order-2' },
        2: { badgeBg: 'bg-gray-400', ringColor: 'ring-gray-300', podiumBg: 'bg-gray-200', podiumNum: 'text-gray-300', height: 'h-44', avatarSize: 'w-24 h-24', order: 'order-1' },
        3: { badgeBg: 'bg-orange-700', ringColor: 'ring-gray-300', podiumBg: 'bg-gray-200', podiumNum: 'text-gray-300', height: 'h-44', avatarSize: 'w-24 h-24', order: 'order-3' },
      }[rank];

      return (
        <div className={`flex flex-col items-center ${config.order} flex-1`}>
          <div className="relative mb-3">
            <img src={employee.avatar} alt="" className={`${config.avatarSize} rounded-full ring-4 ${config.ringColor} object-cover`} />
            <div className={`absolute -bottom-1 -right-1 ${config.badgeBg} text-white w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold border-2 border-white`}>
              {rank}
            </div>
          </div>
          <div className="text-center mb-2 px-2">
            <div className="font-bold text-gray-900 text-base">{employee.name}</div>
            <div className="text-xs text-gray-500 mt-0.5">{employee.title} ({employee.loc})</div>
          </div>
          {rank === 1 ? (
            <div className="bg-amber-100 border border-amber-200 rounded-full px-4 py-1 flex items-center gap-1.5 mb-2 shadow-sm">
              <StarIcon filled className="w-4 h-4 text-amber-500" />
              <span className="font-bold text-gray-800">{employee.total}</span>
            </div>
          ) : (
            <div className="bg-white border border-gray-200 rounded-full px-4 py-1 flex items-center gap-1.5 mb-2 shadow-sm">
              <StarIcon filled className="w-4 h-4 text-blue-500" />
              <span className="font-bold text-blue-500">{employee.total}</span>
            </div>
          )}
          <div className={`w-full ${config.podiumBg} ${config.height} rounded-t-lg flex items-center justify-center`}>
            <span className={`text-7xl font-bold ${config.podiumNum}`}>{rank}</span>
          </div>
        </div>
      );
    }

    function LeaderboardRow({ employee, rank }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <div className="flex items-center px-6 py-4">
            <div className="w-8 text-gray-400 font-medium text-lg">{rank}</div>
            <img src={employee.avatar} alt="" className="w-12 h-12 rounded-full object-cover mx-3" />
            <div className="flex-1 min-w-0">
              <div className="font-bold text-gray-900">{employee.name}</div>
              <div className="text-sm text-gray-500 truncate">{employee.title} ({employee.loc})</div>
            </div>
            <div className="flex items-center gap-1.5 text-blue-500 px-4">
              <PresentationIcon className="w-5 h-5" />
              <span className="text-sm font-medium text-gray-600">{employee.contributions}</span>
            </div>
            <div className="border-l border-gray-200 h-10 mx-4" />
            <div className="flex flex-col items-end mr-2 min-w-[80px]">
              <div className="text-[10px] text-gray-400 font-medium tracking-wider">TOTAL</div>
              <div className="flex items-center gap-1">
                <StarIcon filled className="w-5 h-5 text-blue-500" />
                <span className="font-bold text-blue-500 text-xl">{employee.total}</span>
              </div>
            </div>
            <button
              onClick={() => setExpanded(!expanded)}
              className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors"
            >
              <ChevronDownIcon className={`w-4 h-4 text-gray-500 transition-transform ${expanded ? 'rotate-180' : ''}`} />
            </button>
          </div>
          {expanded && (
            <div className="px-6 py-4 bg-gray-50 border-t border-gray-200 text-sm text-gray-600">
              <div className="grid grid-cols-3 gap-4">
                <div><span className="text-gray-400">Category:</span> <span className="font-medium ml-1">{employee.category}</span></div>
                <div><span className="text-gray-400">Period:</span> <span className="font-medium ml-1">{employee.year} {employee.quarter}</span></div>
                <div><span className="text-gray-400">Contributions:</span> <span className="font-medium ml-1">{employee.contributions}</span></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [year, setYear] = useState('all');
      const [quarter, setQuarter] = useState('all');
      const [category, setCategory] = useState('all');
      const [search, setSearch] = useState('');

      const filtered = useMemo(() => {
        return EMPLOYEES.filter(e => {
          if (year !== 'all' && e.year !== year) return false;
          if (quarter !== 'all' && e.quarter !== quarter) return false;
          if (category !== 'all' && e.category !== category) return false;
          if (search && !e.name.toLowerCase().includes(search.toLowerCase()) && !e.title.toLowerCase().includes(search.toLowerCase())) return false;
          return true;
        }).sort((a, b) => b.total - a.total);
      }, [year, quarter, category, search]);

      const top3 = filtered.slice(0, 3);

      return (
        <div className="min-h-screen bg-gray-50 p-8">
          <div className="max-w-5xl mx-auto">
            <h1 className="text-4xl font-bold text-gray-900 mb-1">Leaderboard</h1>
            <p className="text-gray-500 mb-6">Top performers based on contributions and activity</p>

            <div className="bg-white rounded-lg border border-gray-200 p-3 mb-6 flex gap-3 flex-wrap items-center">
              <FilterDropdown value={year} options={YEARS} onChange={setYear} label="All Years" />
              <FilterDropdown value={quarter} options={QUARTERS} onChange={setQuarter} label="All Quarters" />
              <FilterDropdown value={category} options={CATEGORIES} onChange={setCategory} label="All Categories" />
              <div className="flex-1 min-w-[200px] relative">
                <SearchIcon className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Search employee..."
                  className="w-full bg-gray-100 border border-gray-200 rounded-md py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-blue-500 focus:bg-white"
                />
              </div>
            </div>

            {top3.length >= 3 && (
              <div className="bg-gray-50 px-6 pt-12 pb-0 mb-6">
                <div className="flex items-end gap-4 max-w-3xl mx-auto">
                  <PodiumCard employee={top3[1]} rank={2} />
                  <PodiumCard employee={top3[0]} rank={1} />
                  <PodiumCard employee={top3[2]} rank={3} />
                </div>
              </div>
            )}

            <div className="space-y-2">
              {filtered.map((e, idx) => (
                <LeaderboardRow key={e.id} employee={e} rank={idx + 1} />
              ))}
              {filtered.length === 0 && (
                <div className="bg-white rounded-lg border border-gray-200 p-12 text-center text-gray-500">
                  No employees match your filters.
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
